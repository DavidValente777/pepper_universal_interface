<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white;
        overflow: hidden;
      }
      img {
        max-width: 100%;
        max-height: 100vh;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <img id="displayImage" alt="Display Image" />

    <script>
      function getQueryParam(name) {
        var qs = window.location.search.substring(1);
        var parts = qs.split("&");
        for (var i = 0; i < parts.length; i++) {
          var kv = parts[i].split("=");
          if (decodeURIComponent(kv[0]) === name) {
            return kv.length > 1 ? decodeURIComponent(kv[1]) : "";
          }
        }
        return "";
      }

      var imgFilename = getQueryParam("img") || "temp_pepper_image.png";
      var timestamp = getQueryParam("ts") || new Date().getTime();

      document.getElementById("displayImage").src = imgFilename + "?t=" + timestamp;
    </script>
  </body>
</html>
